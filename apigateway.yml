server:
  port: 8888

spring:

  cloud:
    gateway:
        # cors 처리
        # 각 서비스 모듈은 웹 브라우저와 직접 통신하지 않으므로 단일진입점인 gateway가 담당
        globalcors:
            cors-configurations:
                '[/**]':
                    allowedOrigins:
                        - 'http://localhost:3000'
                    allowedMethods: '*'
                    allowedHeaders: '*'
                    exposedHeaders: '*'
                    allowCredentials: true 
        
        # eureka server 에 등록된 client 찾아서 시용자의 url_pattern을 매핑하는 작업
        routes:
            - id: user-service
              predicates: 
                - Path=/user-service/**
              filters:
                # 첫번째 접두어를 제거하는 뜻
                # http://server.xxxxx.shop/user-service(이게 안보일 것임)/users/signIn
                - StripPrefix=1
              uri: lb://user-service

            - id : product-service
              predicates:
              - Path=/product-service/**
              filters:
              - StripPrefix=1
              uri: lb://product-service

            - id : order-service
              predicates:
              - Path=/order-service/**
              filters:
              - StripPrefix=1
              uri: lb://order-service




jwt:
  secret: daniel-secret-key-for-jwt-123456789
