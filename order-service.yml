
# localhost용
server:
    # eureka server 의해서 임의의 port가 할당(spring server)
  port: 0
  
spring:

  application:
    name: order-service
  

  kafka:
    kafka-server: localhost:9092

# Feign + CircuitBreaker 활성화
feign:
  circuitbreaker:
    enabled: true


# Feign + CircuitBreaker 트렌젝션 정리
resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 10s
    

